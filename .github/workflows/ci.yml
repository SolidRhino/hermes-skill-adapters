name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup

      - name: Lint workflows
        run: actionlint -color

      - name: Test and validate
        run: |
          uv run python -m py_compile scripts/*.py
          uv run python -m json.tool release-please-config.json >/dev/null
          uv run python -m json.tool .release-please-manifest.json >/dev/null
          uv run python scripts/sync_skills.py validate-sources
          uv run python scripts/sync_skills.py validate
          uv run python scripts/sync_skills.py sync --check
          uv run hermes-skill-validate
          uv run hermes-skill-validate-sources
          uv run hermes-skill-sync sync --check
          uv run pytest
