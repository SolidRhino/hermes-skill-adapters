name: Sync upstream skills

on:
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * *"

permissions:
  contents: write
  pull-requests: write
  models: read

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra test --locked

      - name: Lint workflows
        run: docker run --rm -v "$PWD:/repo" rhysd/actionlint:latest -color

      - name: Test
        run: |
          uv run python -m py_compile scripts/*.py
          uv run python scripts/sync_skills.py validate-sources
          uv run pytest

      - name: Sync skills
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_MODEL: openai/gpt-4o-mini
        run: |
          uv run python scripts/sync_skills.py sync --use-github-models
          uv run python scripts/sync_skills.py validate

      - name: Create pull request
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "chore: sync upstream skills"
          title: "chore: sync upstream skills"
          body: "Automated upstream skill sync and Hermes compatibility generation."
          branch: chore/sync-upstream-skills
