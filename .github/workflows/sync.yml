name: Sync upstream skills

on:
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * *"

concurrency:
  group: sync-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  models: read

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup

      - name: Lint workflows
        run: actionlint -color

      - name: Sync skills
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_MODEL: openai/gpt-4o-mini
        run: |
          uv run python scripts/sync_skills.py sync --use-github-models
          uv run python scripts/sync_skills.py validate

      - name: Create pull request
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "chore: sync upstream skills"
          title: "chore: sync upstream skills"
          body: "Automated upstream skill sync and Hermes compatibility generation."
          branch: chore/sync-upstream-skills
