name: Setup Hermes Skill Adapters
description: Install Python, uv, dependencies, and actionlint

runs:
  using: composite
  steps:
    - uses: actions/setup-python@v6
      with:
        python-version: "3.11"

    - uses: astral-sh/setup-uv@v8.2.0
      with:
        enable-cache: true

    - name: Install dependencies
      shell: bash
      run: uv sync --extra test --locked

    - name: Install actionlint
      shell: bash
      run: |
        TAG=$(curl -sSL https://api.github.com/repos/rhysd/actionlint/releases/latest | grep '"tag_name"' | head -1 | sed 's/.*"tag_name": "\(.*\)".*/\1/')
        curl -sSL "https://github.com/rhysd/actionlint/releases/download/${TAG}/actionlint_${TAG#v}_linux_amd64.tar.gz" | tar xz -C /usr/local/bin actionlint
