name: Setup Hermes Skill Adapters
description: Install Python, uv, dependencies, and pinned actionlint

runs:
  using: composite
  steps:
    - uses: actions/setup-python@v6
      with:
        python-version: "3.11"

    - uses: astral-sh/setup-uv@v8.2.0
      with:
        enable-cache: true

    - name: Install dependencies
      shell: bash
      run: uv sync --extra test --locked

    - name: Install actionlint
      shell: bash
      env:
        ACTIONLINT_VERSION: "1.7.12"
        ACTIONLINT_SHA256: "8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8"
      run: |
        set -euo pipefail
        archive="actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
        url="https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/${archive}"
        tmpdir="$(mktemp -d)"
        curl -sSL "$url" -o "$tmpdir/$archive"
        echo "${ACTIONLINT_SHA256}  $tmpdir/$archive" | sha256sum -c -
        tar xzf "$tmpdir/$archive" -C "$tmpdir" actionlint
        install -m 0755 "$tmpdir/actionlint" /usr/local/bin/actionlint
