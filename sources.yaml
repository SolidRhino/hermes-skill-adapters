# yaml-language-server: $schema=./schema.json

skills:
  - name: literate-programming
    upstream:
      repo: tlehman/litprog-skill
      ref: main
      path: .
    target: skills/literate-programming
    include:
      - SKILL.md
      - scripts/
      - references/
      - assets/
    frontmatter:
      mode: auto
      overrides:
        name: literate-programming
        author: Tobi Lehman
        license: unknown
        platforms:
          - linux
          - macos
          - windows
        metadata:
          hermes:
            category: software-development
            homepage: https://github.com/tlehman/litprog-skill
            upstream: https://github.com/tlehman/litprog-skill
            source_repo: tlehman/litprog-skill
    append_notes: overlays/literate-programming/hermes-notes.md

heuristics:
  context_files:
    - README.md
    - SKILL.md
    - CONTRIBUTING.md
  known_commands:
    - bun
    - pandoc
    - xelatex
    - mermaid-filter
    - node
    - npm
    - python
    - uv
    - deno
    - go
    - cargo
    - rustc
    - docker
    - kubectl
    - helm
    - terraform
    - ansible
  keyword_tags:
    literate: literate-programming
    pandoc: pandoc
    mermaid: mermaid
    markdown: markdown
    tangle: tangle
    weave: weave
    pdf: pdf
    typescript: typescript
    python: python
    documentation: documentation
    reverse-sync: reverse-sync
    hook: hooks
    docker: docker
    kubernetes: kubernetes
    terraform: infrastructure-as-code
    ansible: configuration-management
    testing: testing
    pytest: testing
    vitest: testing
    jest: testing
    deno: deno
    rust: rust
    golang: go
    api: api
    cli: cli
    security: security
    monitoring: monitoring
